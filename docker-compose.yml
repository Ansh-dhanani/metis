# ============================================================
# Metis Hire — Docker Compose
# Services: mongodb  •  backend (Flask)  •  frontend (Next.js)
#
# Quick start:
#   1. cp backend/.env.example  backend/.env   && fill in values
#   2. cp frontend/.env.example frontend/.env.local && fill in values
#   3. docker compose up --build
#
# Access:
#   Frontend  → http://localhost:3000
#   Backend   → http://localhost:5000
#   MongoDB   → localhost:27017
# ============================================================

services:

  # ── MongoDB ─────────────────────────────────────────────────
  # If you want to use a local MongoDB container instead of MongoDB Atlas,
  # uncomment the section below. Otherwise, MongoDB Atlas will be used via MONGO_URI.
  #
  # mongodb:
  #   image: mongo:7.0
  #   container_name: metis-mongodb
  #   restart: unless-stopped
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodb_data:/data/db
  #     - mongodb_config:/data/configdb
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
  #     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
  #     MONGO_INITDB_DATABASE: metis
  #   networks:
  #     - metis-network
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 20s

  # ── Flask Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: metis-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      PORT: "5000"
      # Uses MONGO_URI from .env (points to MongoDB Atlas by default)
      # The backend/.env file contains the actual MongoDB Atlas credentials
    env_file:
      - path: ./backend/.env
        required: true   # backend/.env must exist with MONGO_URI
    networks:
      - metis-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass env vars as build args — inlined into Next.js at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:5000}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-8pK9Lm2nQw5rTxYuZaB1cDeFgHiJkLoP}
    container_name: metis-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-8pK9Lm2nQw5rTxYuZaB1cDeFgHiJkLoP}
      # For server-side API calls inside Docker (use service name)
      INTERNAL_API_URL: http://backend:5000
      # For client-side API calls from the browser (use localhost)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:5000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
    env_file:
      - path: ./frontend/.env.local
        required: false   # skip if file does not exist yet
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - metis-network

# ── Shared network ───────────────────────────────────────────
networks:
  metis-network:
    driver: bridge

# ── Persistent volumes (for local MongoDB if you enable it) ───
# Uncomment these if you uncomment the MongoDB service above
# volumes:
#   mongodb_data:
#     driver: local
#   mongodb_config:
#     driver: local
